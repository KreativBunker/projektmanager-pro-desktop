<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Einstellungen – ProjektManager Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      padding: 24px;
      -webkit-app-region: no-drag;
      user-select: none;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
    }
    .logo {
      display: block;
      margin: 0 auto 16px;
      width: 64px;
      height: 64px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #6e6e73;
    }
    input[type="text"], input[type="url"] {
      width: 100%;
      padding: 8px 12px;
      font-size: 14px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #0073aa;
      box-shadow: 0 0 0 3px rgba(0, 115, 170, 0.15);
    }
    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .row input { flex: 1; }
    .btn {
      padding: 8px 16px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
    }
    .btn-primary {
      background: #0073aa;
      color: #fff;
      width: 100%;
      padding: 10px;
      margin-top: 8px;
    }
    .btn-primary:hover { background: #005a87; }
    .btn-secondary {
      background: #e8e8ed;
      color: #1d1d1f;
      white-space: nowrap;
    }
    .btn-secondary:hover { background: #d2d2d7; }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .toggle-row label { margin-bottom: 0; }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #d2d2d7;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle .slider::before {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      left: 2px;
      top: 2px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider { background: #0073aa; }
    .toggle input:checked + .slider::before { transform: translateX(20px); }
    .hint {
      font-size: 12px;
      color: #86868b;
      margin-top: 4px;
    }
    .status {
      text-align: center;
      font-size: 13px;
      margin-top: 12px;
      min-height: 20px;
    }
    .status.success { color: #34c759; }
    .status.error { color: #ff3b30; }
  </style>
</head>
<body>
  <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" rx="20" fill="#0073aa"/>
    <text x="50" y="62" text-anchor="middle" fill="#fff" font-size="36" font-weight="700" font-family="-apple-system, sans-serif">PM</text>
    <text x="50" y="80" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="12" font-weight="500" font-family="-apple-system, sans-serif">PRO</text>
  </svg>

  <h1>ProjektManager Pro</h1>

  <div class="form-group">
    <label for="siteUrl">WordPress-Seiten-URL</label>
    <input type="url" id="siteUrl" placeholder="https://meine-seite.de">
    <p class="hint">Die URL Ihrer WordPress-Installation mit ProjektManager Pro.</p>
  </div>

  <div class="form-group">
    <label for="downloadPath">Download-Ordner</label>
    <div class="row">
      <input type="text" id="downloadPath" readonly>
      <button class="btn btn-secondary" id="btnSelectDir">Wählen…</button>
    </div>
    <p class="hint">Hier werden heruntergeladene Dateien gespeichert.</p>
  </div>

  <div class="toggle-row">
    <label>Dateien nach Download automatisch öffnen</label>
    <div class="toggle">
      <input type="checkbox" id="openFilesLocally" checked>
      <span class="slider"></span>
    </div>
  </div>

  <button class="btn btn-primary" id="btnSave">Speichern &amp; Verbinden</button>
  <p class="status" id="status"></p>

  <script src="config.js"></script>
</body>
</html>
