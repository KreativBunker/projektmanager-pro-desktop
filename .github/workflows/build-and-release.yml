name: Build & Release Desktop App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Sync version from git tag
        shell: bash
        run: |
          # Version aus Git-Tag extrahieren (v1.2.3 → 1.2.3)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$CURRENT_VERSION" ]; then
            echo "Version mismatch: package.json=$CURRENT_VERSION, tag=$TAG_VERSION"
            echo "Updating package.json to $TAG_VERSION"
            npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version
          fi

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: node scripts/generate-icons.js

      # ── macOS: Python 3.11 für dmg-builder (dmgbuild-Skript inkompatibel mit 3.12+) ──
      - name: Setup Python 3.11 (macOS)
        if: matrix.platform == 'mac'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── macOS: Spotlight deaktivieren, damit hdiutil detach nicht blockiert ──
      - name: Disable Spotlight indexing (macOS)
        if: matrix.platform == 'mac'
        run: |
          sudo mdutil -a -i off
          sudo launchctl bootout system/com.apple.metadata.mds || true

      # ── macOS: Zertifikat importieren ──
      - name: Import macOS Code Signing Certificate
        if: matrix.platform == 'mac' && env.CSC_LINK != ''
        env:
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: echo "macOS Code-Signing-Zertifikat wird von electron-builder automatisch verwendet."

      # ── Build mit Signierung, Notarisierung und Publish ──
      - name: Build and publish (${{ matrix.platform }})
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS Code Signing – wenn kein Zertifikat vorhanden, Auto-Discovery deaktivieren
          # Hinweis: Boolean false wird in GitHub Actions zum leeren String,
          # daher explizit String 'true'/'false' verwenden
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.MAC_CERTIFICATE_P12 != '' && 'true' || 'false' }}
          # macOS Notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows Code Signing
          WIN_CSC_LINK: ${{ secrets.WIN_CERTIFICATE_P12 }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}
        run: |
          # Leere Zertifikat-Umgebungsvariablen entfernen, damit electron-builder
          # den leeren String nicht als Dateipfad interpretiert ("not a file"-Fehler)
          if [ -z "$CSC_LINK" ]; then
            unset CSC_LINK
            unset CSC_KEY_PASSWORD
          fi
          if [ -z "$WIN_CSC_LINK" ]; then
            unset WIN_CSC_LINK
            unset WIN_CSC_KEY_PASSWORD
          fi
          npx electron-builder --${{ matrix.platform }} --publish always

      - name: List built files
        if: always()
        shell: bash
        run: find dist -maxdepth 1 -type f | sort

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.zip
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
